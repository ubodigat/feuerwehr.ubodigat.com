<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/fahrzeugkunde/style.css">
    <link rel="icon" href="/picture/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/picture/favicon.ico" />
    <title>Fahrzeugkunde | Feuerwehr Buchenberg</title>
</head>

<body>
    <header>
        <div class="container">
            <div id="header-content">
                <a id="header-logo" href="/">
                    <img src="/picture/Buchenberg_Wappen.png" alt="Buchenberg Wappen">
                </a>
                <div id="header-text">
                    <a id="header-title" href="https://www.feuerwehr-buchenberg.de/" target="_blank">Feuerwehr Buchenberg</a>
                    <p id="header-subtitle">Fahrzeugkunde</p>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="fahrzeug-list">
                <button class="fahrzeug-button" onclick="showFahrzeugInfo('mtw')">MTW</button>
                <button class="fahrzeug-button" onclick="showFahrzeugInfo('hlf20')">HLF20/16</button>
                <button class="fahrzeug-button" onclick="showFahrzeugInfo('tlf3000')">TLF3000 ST</button>
                <button class="fahrzeug-button" onclick="showFahrzeugInfo('lf8')">LF8</button>
            </div>
            <div class="fahrzeug-info" id="fahrzeug-info" style="background-image: url('/picture/fahrzeug.png'); background-position: right 87%; background-size: 40%; background-repeat: no-repeat;">
                <h2 id="fahrzeug-title">Wähle ein Fahrzeug</h2>
                <img id="fahrzeug-image" src="" alt="" style="display:none;">
                <p id="fahrzeug-description"></p>
                <button id="start-uebung-button" style="display:none;" onclick="startUebung()">Übungen starten</button>
            </div>
            <section id="uebung-section" style="display:none;">
                <div class="quiz-container">
                    <div class="quiz-header">
                        <h3 id="quiz-title">Übung</h3>
                        <div id="quiz-progress">Frage <span id="quiz-index">1</span>/<span id="quiz-total">1</span></div>
                    </div>

                    <div class="quiz-card">
                        <p id="quiz-question">Frage kommt hier hin…</p>
                        <div id="quiz-options" class="quiz-options"></div>
                    </div>

                    <div class="quiz-actions">
                        <button id="quiz-prev" onclick="prevQuestion()" disabled>Zurück</button>
                        <button id="quiz-next" onclick="nextQuestion()">Weiter</button>
                        <button id="quiz-finish" onclick="finishQuiz()" style="display:none;">Auswertung</button>
                    </div>

                    <div id="quiz-result" class="quiz-result" style="display:none;"></div>
                </div>
            </section>
        </div>
    </main>
    <script src="/fahrzeugkunde/script.js"></script>

</body>

</html>
